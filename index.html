<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
  <style>
    * {
      font-family: "Press Start 2P", cursive;
    }
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body {
      background-color: black;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    h1 {
      margin: 0;
    }
    button {
      border: 0;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #ddd;
    }
  </style>
</head>

<div style="display: inline-block; width: 100%; height: 100vh">
  <div id="overlappingDiv" style="
      background-color: black;
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    "></div>
  <canvas></canvas>
    <div style="
        background-color: white;
        height: 140px;
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        border-top: 4px black solid;
        display: flex;
      ">
      <div id="attackBox" style="
          width: 66.66%;
          display: grid;
          grid-template-columns: repeat(2, 1fr);
        ">
        <button>Attack1</button>
        <button>Attack2</button>
        </div>
      <div style="
          display: flex;
          align-items: center;
          justify-content: center;
          width: 33.33%;
          border-left: 4px black solid;
        ">
        <h1 id="attackType" style="font-size: 16px">Attack Type</h1>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"
  integrity="sha512-6+YN/9o9BWrk6wSfGxQGpt3EUK6XeHi6yeHV+TYD2GR0Sj/cggRpXr1BrAQf0as6XslxomMUxXp2vIl+fv0QRA=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="data/battleZones.js"></script>
<script src="data/collisions.js"></script>
<script src="classes.js"></script>
<script src="index.js"></script>
